name: Deploy mini-graph to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-mini-graph
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Check Pages enabled
        run: |
          if ! gh api repos/${{ github.repository }}/pages &>/dev/null; then
            echo "::error::GitHub Pages is not enabled. Please enable it in Settings → Pages → Source: GitHub Actions"
            exit 1
          fi
          echo "✓ GitHub Pages is enabled"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve GitHub Pages base
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "GITHUB_PAGES_BASE=/mini-graph/" >> "$GITHUB_ENV"
          else
            echo "GITHUB_PAGES_BASE=/$REPO_NAME/mini-graph/" >> "$GITHUB_ENV"
          fi
          echo "✓ Base path set to: $GITHUB_PAGES_BASE"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build mini-graph
        run: bun run build:minimal-graph

      - name: Verify build output
        run: |
          if [ ! -f ./example/mini-graph/dist/index.html ]; then
            echo "::error::Build output missing index.html"
            exit 1
          fi
          echo "✓ Build output verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./example/mini-graph/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
