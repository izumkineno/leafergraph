name: Deploy mini-graph to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-mini-graph
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve GitHub Pages base
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "GITHUB_PAGES_BASE=/mini-graph/" >> "$GITHUB_ENV"
          else
            echo "GITHUB_PAGES_BASE=/$REPO_NAME/mini-graph/" >> "$GITHUB_ENV"
          fi
          echo "GITHUB_PAGES_OUT_DIR=mini-graph" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build mini-graph
        run: bun run build:minimal-graph

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./example/mini-graph/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
